<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAN File Share</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #333; }
  h1 { margin-bottom: 24px; }
  .section { margin-bottom: 28px; }
  .section h2 { font-size: 1.1em; margin-bottom: 10px; color: #555; }
  input[type=text], input[type=file] { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 6px 16px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #1d4ed8; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #eee; }
  th { background: #f8f8f8; font-weight: 600; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .msg { padding: 10px; margin-top: 10px; border-radius: 4px; }
  .ok { background: #dcfce7; color: #166534; }
  .err { background: #fee2e2; color: #991b1b; }
  #drop-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 32px; text-align: center; color: #999; margin-bottom: 10px; transition: all 0.2s; }
  #drop-zone.drag { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
</style>
</head>
<body>
<h1>LAN File Share</h1>

<div class="section">
  <h2>Upload</h2>
  <div id="drop-zone">Drag & drop file here, or click to select</div>
  <input type="file" id="file-input" style="display:none">
  <div id="upload-msg"></div>
</div>

<div class="section">
  <h2>Search</h2>
  <input type="text" id="search-input" placeholder="keyword...">
  <button onclick="doSearch()">Search</button>
</div>

<div class="section">
  <h2>Files on Server <button onclick="loadFiles()" style="font-size:0.8em;">Refresh</button></h2>
  <table><thead><tr><th>Name</th><th>Size</th><th></th></tr></thead><tbody id="file-list"></tbody></table>
</div>

<script>
function fmt(bytes) {
  if (bytes >= 1e6) return (bytes/1e6).toFixed(2) + ' MB';
  if (bytes >= 1e3) return (bytes/1e3).toFixed(1) + ' KB';
  return bytes + ' B';
}

function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.textContent = text;
}

async function loadFiles(query) {
  const url = query ? '/api/search?keyword=' + encodeURIComponent(query) : '/api/list';
  const res = await fetch(url);
  const data = await res.json();
  const tbody = document.getElementById('file-list');
  tbody.innerHTML = '';
  (data.files || []).forEach(f => {
    const tr = document.createElement('tr');
    const encoded = encodeURIComponent(f.name);
    tr.innerHTML = '<td>' + f.name + '</td><td>' + fmt(f.size) + '</td>'
      + '<td><a href="/api/download/' + encoded + '">Download</a> '
      + '<button class="del-btn" data-name="' + encoded + '" style="font-size:0.8em;background:#dc2626;">Delete</button></td>';
    tbody.appendChild(tr);
  });
}

function doSearch() {
  loadFiles(document.getElementById('search-input').value.trim());
}

async function doDelete(name) {
  if (!confirm('Delete ' + name + '?')) return;
  const res = await fetch('/api/delete/' + encodeURIComponent(name), { method: 'POST' });
  const data = await res.json();
  if (data.status === 'OK') loadFiles();
  else alert(data.message || 'Delete failed');
}

// Upload
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); uploadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); });

async function uploadFile(file) {
  if (!file) return;
  dropZone.textContent = 'Uploading ' + file.name + '...';
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (data.status === 'OK') {
      showMsg('upload-msg', 'Uploaded: ' + data.stored_as + ' (' + fmt(data.size) + ')', true);
      loadFiles();
    } else {
      showMsg('upload-msg', data.message || 'Upload failed', false);
    }
  } catch(e) {
    showMsg('upload-msg', 'Error: ' + e.message, false);
  }
  dropZone.textContent = 'Drag & drop file here, or click to select';
  fileInput.value = '';
}

// Delete via event delegation
document.getElementById('file-list').addEventListener('click', e => {
  if (e.target.classList.contains('del-btn')) {
    doDelete(decodeURIComponent(e.target.dataset.name));
  }
});

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
loadFiles();
</script>
</body>
</html>
